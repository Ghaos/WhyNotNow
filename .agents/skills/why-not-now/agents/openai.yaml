interface:
  display_name: "Why Not Now?"
  short_description: "Record a task for later and discuss why not now."
  default_prompt: "Use $why-not-now to record a task as deferred and discuss why it should not be done now. Do not start the task."

policy:
  allow_implicit_invocation: false

dependencies:
  tools:
    - type: "mcp"
      value: "why-not-now"
      description: "Shows structured WhyNotNow forms and persists accepted choices."
