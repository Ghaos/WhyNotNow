interface:
  display_name: "Why Not Now?"
  short_description: "Capture tasks and weigh why to do them or wait."
  default_prompt: "Use $why-not-now to capture a task and decide whether to do it now or explain why not."

policy:
  allow_implicit_invocation: false

dependencies:
  tools:
    - type: "mcp"
      value: "why-not-now"
      description: "Shows structured WhyNotNow forms and persists accepted choices."
