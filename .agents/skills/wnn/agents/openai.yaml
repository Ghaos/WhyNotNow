interface:
  display_name: "Why Not Now?"
  short_description: "Record a task and choose the next action."
  default_prompt: "Use $wnn to record a task, then choose whether to do it now, explore why not now, end, or delegate research."

policy:
  allow_implicit_invocation: false

dependencies:
  tools:
    - type: "mcp"
      value: "why-not-now"
      description: "Shows structured WhyNotNow forms and persists accepted choices."
